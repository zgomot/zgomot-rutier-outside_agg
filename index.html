<!DOCTYPE html>
<html>
<head>
    <title>Zgomot rutier – outside aglomerări</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body { margin:0; }
        #map { height: 100vh; }

        #controls {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
        }

        .legend {
            background: white;
            padding: 10px;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div id="controls">
    <b>Indicator:</b><br>
    <select id="layerSelect">
        <option value="lden">Lden</option>
        <option value="lnight">Lnight</option>
    </select>
</div>

<div id="map"></div>

<script>
var map = L.map('map').setView([44.5, 26.1], 10);

// Basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// WMS URL
var wmsUrl = "https://geonoise.mmap.ro/ows/services/org.3.1bddf4a2-83b0-4599-9851-44be4419a975_wms";

// Lden
var lden = L.tileLayer.wms(wmsUrl, {
    layers: 'NoiseContours_majorRoadsIncludingAgglomeration_Lden',
    format: 'image/png',
    transparent: true,
    version: '1.1.1',
    crs: L.CRS.EPSG3857,
    tiled: true,
    opacity: 0.9
});

// Lnight
var lnight = L.tileLayer.wms(wmsUrl, {
    layers: 'NoiseContours_majorRoadsIncludingAgglomeration_Lnight',
    format: 'image/png',
    transparent: true,
    version: '1.1.1',
    crs: L.CRS.EPSG3857,
    tiled: true,
    opacity: 0.9
});

// default
lden.addTo(map);

// selector
document.getElementById("layerSelect").addEventListener("change", function() {
    map.removeLayer(lden);
    map.removeLayer(lnight);

    if (this.value === "lden") {
        lden.addTo(map);
    } else {
        lnight.addTo(map);
    }
});

// legendă reală GeoNoise
var legend = L.control({position: 'bottomright'});

legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'legend');

    div.innerHTML = `
    <b>Legendă zgomot (dB)</b><br><br>

    <b>Lden</b><br>
    <div style="background:#006837;padding:3px;color:white;">&lt; 40 dB</div>
    <div style="background:#31a354;padding:3px;">40–44 dB</div>
    <div style="background:#78c679;padding:3px;">45–49 dB</div>
    <div style="background:#c2e699;padding:3px;">50–54 dB</div>
    <div style="background:#fed976;padding:3px;">55–59 dB</div>
    <div style="background:#fd8d3c;padding:3px;">60–64 dB</div>
    <div style="background:#f03b20;padding:3px;color:white;">65–69 dB</div>
    <div style="background:#bd0026;padding:3px;color:white;">70–74 dB</div>
    <div style="background:#800026;padding:3px;color:white;">&gt; 75 dB</div>

    <br>

    <b>Lnight</b><br>
    <div style="background:#006837;padding:3px;color:white;">&lt; 40 dB</div>
    <div style="background:#31a354;padding:3px;">40–44 dB</div>
    <div style="background:#78c679;padding:3px;">45–49 dB</div>
    <div style="background:#c2e699;padding:3px;">50–54 dB</div>
    <div style="background:#fed976;padding:3px;">55–59 dB</div>
    <div style="background:#fd8d3c;padding:3px;">60–64 dB</div>
    <div style="background:#f03b20;padding:3px;color:white;">65–69 dB</div>
    <div style="background:#bd0026;padding:3px;color:white;">&gt; 70 dB</div>
    `;

    return div;
};

legend.addTo(map);

</script>

</body>
</html>
